name: Publish to GitHub Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm install

      # Build core package
      - name: Build @nextpaneljs/core
        run: cd packages/core && npm run build

      # Build CLI package
      - name: Build @nextpaneljs/cli
        run: cd packages/cli && npm run build

      # Publish core
      - name: Publish @nextpaneljs/core
        run: cd packages/core && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}

      # Publish CLI
      - name: Publish @nextpaneljs/cli
        run: cd packages/cli && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}
